<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- PyScript -->
<link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
<script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

<title>Seatwork 2 Third Quarter</title>

<style>
body{
    background-color: rgb(72, 71, 71);
}
</style>

</head>

<body id="pageBody">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

<a class="navbar-brand d-flex align-items-center" href="#">
<img id="teamLogo" src="logo.png" width="40" height="40" class="me-2">
Intrams
</a>

<div class="ms-auto">
<a class="btn btn-outline-light me-2" href="#">Signup</a>
<a class="btn btn-outline-light me-2" href="index.html">Team Checker</a>
<a class="btn btn-outline-light" href="#">Players</a>
</div>

</nav>

<!-- MAIN CONTENT -->
<div class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 w-50 shadow">
<h2 class="text-center mb-4">Seatwork 2 Third Quarter</h2>

<form>

<!-- Question 1 -->
<div class="mb-3">
<label class="form-label">Are you done with the online registration?</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="registered" name="registration" value="registered">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="notRegistered" name="registration" value="notRegistered">
<label class="form-check-label">No</label>
</div>
</div>

<!-- Question 2 -->
<div class="mb-3">
<label class="form-label">Do you have the medical clearance from the clinic?</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="cleared" name="clearance" value="cleared">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" id="notCleared" name="clearance" value="notCleared">
<label class="form-check-label">No</label>
</div>
</div>

<!-- Question 3 -->
<div class="mb-3">
<label class="form-label">What's your Grade & Section?</label>

<select id="level" class="form-select mb-2">
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>

<select id="section" class="form-select">
<option value="emerald">Emerald</option>
<option value="ruby">Ruby</option>
<option value="sapphire">Sapphire</option>
<option value="topaz">Topaz</option>
</select>

</div>

<div class="d-grid">
<input type="button" py-click="intrams_checker" value="Sign up" class="btn btn-primary">
</div>

</form>

<center>
<div id="output" class="mt-3"></div>
<div id="image" class="mt-3"></div>
</center>

</div>
</div>

<py-script src="main.py"></py-script>

</body>
</html>
